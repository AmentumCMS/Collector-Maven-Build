# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Maven Collector - Other Branch
run-name: ${{ github.actor }} is Collecting Maven-ness (${{ github.ref_name }})🚀
on:
  push:
    branches-ignore:
      - main
      - develop
  workflow_dispatch:
jobs:
  Date:
    runs-on: ubuntu-latest
    outputs:
      Date: ${{ steps.DATE.outputs.DATE }}
    steps:
      - name: Get current date
        id: DATE
        run: |
          echo "Setting Date"
          echo "DATE=$(date '+%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          echo -e "\n$GITHUB_OUTPUT\n"
          echo "Values:"
          cat $GITHUB_OUTPUT

  UpdateVers:
    runs-on: ubuntu-latest
    needs: [Date]
    permissions:
      contents: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Set up git
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"

      - name: Advance Dependency versions
        run: |
          set +ex
          mvn --no-transfer-progress -DskipTests=true -ssettings.xml -B versions:update-parent
          git commit -am "Update versions (${{ needs.Date.outputs.Date }})"
          git push
  BuildOnce:
    needs: [Date, UpdateVers]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      # One build that populates ~/.m2 AND generates CycloneDX BOMs
      # If cyclonedx is not in the build, keep this as "package" and let CollectBOM run its own mvn.
      - name: Build once (populate ~/.m2 + generate BOM)
        run: |
          mvn -DskipTests=true --no-transfer-progress -B -s settings.xml \
            package cyclonedx:makeAggregateBom
            
      - name: Create BoM ZIP
        run: |
          echo -e "\nTarget Directory Listing"
          ls -lAh target/* || true
          echo -e "\nTree of Target directory"
          tree target || true
          echo -e "\nZipping BOMs"
          zip -jD ${{ vars.COLLECTOR }}-bom-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.zip target/bom.*
      - name: Export Maven dependency tree (text + dot)
        run: |
          # Text tree (reactor)
          mvn -DskipTests=true --no-transfer-progress -B -s settings.xml \
            -DoutputType=text \
            -DoutputFile="${{ vars.COLLECTOR }}-deptree-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.txt" \
            dependency:tree

          # Optional: Graphviz DOT format (nice for visualizing)
          mvn -DskipTests=true --no-transfer-progress -B -s settings.xml \
            -DoutputType=dot \
            -DoutputFile="${{ vars.COLLECTOR }}-deptree-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.dot" \
            dependency:tree

          ls -lAh ${{ vars.COLLECTOR }}-deptree-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.*
      - name: Upload dependency tree artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-deptree-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}
          path: |
            ${{ vars.COLLECTOR }}-deptree-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.txt
            ${{ vars.COLLECTOR }}-deptree-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.dot

      - name: Upload BOM ZIP
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-bom-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.zip
          path: ${{ vars.COLLECTOR }}-bom-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.zip

      - name: TARchive .m2 directory (collector payload)
        run: |
          ls -lAh ${{ github.workspace }}
          tar -cvzf ${{ vars.COLLECTOR }}-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.tgz \
            --exclude='_remote.repositories' -C ~/.m2 \
            repository \
            | tee ${{ vars.COLLECTOR }}-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.tgz.txt

      - name: Upload M2 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.tgz
          path: ${{ vars.COLLECTOR }}-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.tgz

      - name: Upload M2 ToC artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.tgz.txt
          path: ${{ vars.COLLECTOR }}-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.tgz.txt

  VulnScan:
    needs: [Date, BuildOnce]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Download M2 artifact from BuildOnce
        uses: actions/download-artifact@v4
        with:
          name: ${{ vars.COLLECTOR }}-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.tgz
          path: .

      - name: Restore ~/.m2/repository
        run: |
          mkdir -p ~/.m2
          tar -xzf "${{ vars.COLLECTOR }}-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.tgz" -C ~/.m2

      # syft/sbom-action "path" is relative to repo root, so expose ~/.m2/repository inside workspace
      - name: Link Maven repository into workspace
        run: |
          mkdir -p m2repo
          ln -s ~/.m2/repository m2repo/repository
          ls -lAh m2repo

      - name: Generate SBOM (Syft) for ~/.m2/repository
        uses: anchore/sbom-action@v0.20.11
        with:
          path: m2repo/repository
          format: spdx-json
          output-file: ${{ vars.COLLECTOR }}-sbom-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.spdx.json
          dependency-snapshot: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-sbom-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.spdx.json
          path: ${{ vars.COLLECTOR }}-sbom-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.spdx.json

      - name: Grype scan (SARIF)
        uses: anchore/scan-action@v7.2.2
        with:
          path: m2repo/repository
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          output-file: ${{ vars.COLLECTOR }}-grype-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sarif

      - name: Upload Grype SARIF
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-grype-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sarif
          path: ${{ vars.COLLECTOR }}-grype-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ vars.COLLECTOR }}-grype-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sarif

      - name: Grype scan (JSON)
        uses: anchore/scan-action@v7.2.2
        with:
          path: m2repo/repository
          fail-build: false
          severity-cutoff: high
          output-format: json
          output-file: ${{ vars.COLLECTOR }}-grype-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.json

      - name: Upload Grype JSON
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-grype-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.json
          path: ${{ vars.COLLECTOR }}-grype-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.json

      # Human-friendly "proof" report into Step Summary
      - name: Generate Grype Proof Report
        if: always()
        run: |
          set +e
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b .
          ./grype --version

          # Table format is easiest to read in summary
          ./grype m2repo/repository -o table > grype-report.txt

          echo "## Grype Results (Maven ~/.m2) ⚓" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Avoid mega summaries; keep it readable
          head -n 250 grype-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          total_lines=$(wc -l < grype-report.txt | tr -d ' ')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Grype report saved as artifact. Total lines: ${total_lines}_" >> $GITHUB_STEP_SUMMARY

      - name: Upload Grype Evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evidence-grype-report-m2-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}
          path: grype-report.txt

      - name: Install OSV-Scanner CLI
        if: always()
        run: |
          set -euo pipefail
          OSV_VERSION="v2.3.2"
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x ./osv-scanner
          ./osv-scanner --version

      - name: OSV scan (JSON + SARIF)
        if: always()
        run: |
          set +e
          ./osv-scanner scan . \
            --format json \
            --output "${{ vars.COLLECTOR }}-osv-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.json"

          ./osv-scanner scan . \
            --format sarif \
            --output "${{ vars.COLLECTOR }}-osv-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sarif"

      - name: Upload OSV JSON
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-osv-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.json
          path: ${{ vars.COLLECTOR }}-osv-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.json

      - name: Upload OSV SARIF artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-osv-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sarif
          path: ${{ vars.COLLECTOR }}-osv-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sarif

      - name: Upload OSV SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ vars.COLLECTOR }}-osv-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sarif

      - name: Publish OSV Summary
        if: always()
        run: |
          echo "## OSV-Scanner Results 🛡️" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # keep summary readable
          head -n 200 "${{ vars.COLLECTOR }}-osv-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.json" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Update dependency graph
        uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6


  Code:
    needs: [Date, UpdateVers]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Setup Git
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"

      - name: Update Submodules if needed
        shell: bash
        run: git submodule update --init --recursive --remote

      - name: Bundle Repo1 code base for ${{ vars.COLLECTOR }}
        run: |
          git bundle create --progress ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.bundle --all
          ls -1Ssh *

      - name: Upload bundle
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.bundle
          path: ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.bundle

  CollectBOM:
    needs: [Date, UpdateVers]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -DskipTests=true -B --no-transfer-progress  -s settings.xml cyclonedx:makeAggregateBom

      - name: Create BoM ZIP
        run: |
          echo -e "\nTarget Directory Listing"
          ls -lAh target/*
          echo -e "\nTree of Target directory"
          tree target
          echo -e "\nZipping BOMs"
          zip -jD ${{ vars.COLLECTOR }}-bom-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.zip \
            target/bom.*

      - name: Upload BOM ZIP
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-bom-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.zip
          path: ${{ vars.COLLECTOR }}-bom-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.zip

  CollectXSD:
    needs: [Date]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Collect http://maven.apache.org/xsd
        run: |
          set +e
          wget -np -rN -l 1 --no-verbose http://maven.apache.org/xsd
          case $? in
            0) echo "Success";;
            8) echo "No changes";;
            *) echo "Failed";;
          esac

      - name: Zipup XSDs
        run: |
          cd maven.apache.org
          zip -r  ../${{ vars.COLLECTOR }}-xsd-${{ needs.Date.outputs.Date }}.zip xsd

      - name: Upload XSD artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-xsd-${{ needs.Date.outputs.Date }}.zip
          path: ${{ vars.COLLECTOR }}-xsd-${{ needs.Date.outputs.Date }}.zip
          if-no-files-found: error

  MakeISO:
    runs-on: ubuntu-latest
    needs: [Date, BuildOnce, VulnScan, CollectXSD, UpdateVers, Code]
    env:
        GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Install mkisofs
        run: |
          sudo apt-get update -y
          sudo apt-get install -y mkisofs isomd5sum

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate Artifact Hash
        run: |
          sha256sum -b ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}* | tee \
            ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sha

      - name: Upload Artifact sha artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sha
          path: ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.sha
          if-no-files-found: error

      - name: Show Artifacts
        run: ls -1Ssh ${{ vars.COLLECTOR }}-*.*

      - name: Make ISO
        run: |
          mkisofs -J -R -v -T -l \
            -V '${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}' \
            -A '${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}' \
            -o ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.iso \
            ${{ vars.COLLECTOR }}-*.*

      - name: Implant MD5 sum into iso
        run: implantisomd5 ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.iso

      - name: Generate ISO Hash
        run: |
          sha256sum -b ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.iso | tee \
            ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.iso.sha

      - name: Show ISO & Hash
        run: ls -1Ssh *.iso*

      - name: Upload iso artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.iso
          path: "*.iso*"
          if-no-files-found: error

  VirusScan:
    runs-on: ubuntu-latest
    needs: [Date, MakeISO]
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          pattern: "*.iso"

      # - name: Download TGZ artifacts
      #   uses: actions/download-artifact@v4
      #   with:
      #     merge-multiple: true
      #     pattern: "*-${{ needs.Date.outputs.Date }}.tgz"

      - name: List files to scan
        run: |
          echo "Files to be scanned:"
          ls -lh

      - name: Scan files for viruses
        id: virus_scan
        uses: hugoalh/scan-virus-ghaction/clamav@v0.20.1
        with:
          clamav_update: true
          found_log: true
          found_summary: true
          statistics_log: true
          statistics_summary: true

      - name: Save scan summary
        if: always()
        run: |
          echo "Virus scan completed" > ${{ vars.COLLECTOR }}-virus-scan-report-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.txt
          echo "Scan finished: ${{ steps.virus_scan.outputs.finish }}" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.txt
          echo "Viruses found: ${{ steps.virus_scan.outputs.found }}" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.txt
          echo "" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.txt
          echo "For detailed scan results, check the job logs and step summary." >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.txt

      - name: Upload virus scan report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-virus-scan-report-${{ github.ref_name }}-${{ needs.Date.outputs.Date }}.txt
          path: "*virus-scan-report*.txt"
          if-no-files-found: warn

  Release:
    runs-on: ubuntu-latest
    needs: [Date, VirusScan]
    env:
        GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Show Artifacts
        run: ls -1Ssh ${{ vars.COLLECTOR }}-*.*

  Sharepoint:
    runs-on: ubuntu-latest
    needs: [Date, VirusScan]
    env:
        GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Show Artifacts
        run: ls -1Ssh ${{ vars.COLLECTOR }}-*.*
