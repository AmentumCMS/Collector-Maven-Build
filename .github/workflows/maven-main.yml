# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Maven Collector - Main
run-name: ${{ github.actor }} is Collecting Maven-ness (Main) 🚀

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 1 * *" # First of month at midnight UTC
  workflow_dispatch:

env:
  BRANCH_NAME: main

jobs:
  Date:
    runs-on: ubuntu-latest
    outputs:
      Date: ${{ steps.DATE.outputs.DATE }}
    steps:
      - name: Get current date
        id: DATE
        run: |
          echo "Setting Date"
          echo "DATE=$(date '+%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          echo -e "\n$GITHUB_OUTPUT\n"
          echo "Values:"
          cat $GITHUB_OUTPUT

  CollectM2:
    needs: [Date]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -DskipTests=true --no-transfer-progress -s settings.xml -B package

      - name: TARchive .m2 directory
        run: |
          ls -lAh ${{ github.workspace }}
          tar -cvzf ${{ vars.COLLECTOR }}-m2-${{ needs.Date.outputs.Date }}.tgz \
            --exclude='_remote.repositories' -C ~/.m2 \
            repository \
            | tee ${{ vars.COLLECTOR }}-m2-${{ needs.Date.outputs.Date }}.tgz.txt

      - name: Upload M2 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.tgz
          path: ${{ vars.COLLECTOR }}-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.tgz

      - name: Upload M2 ToC artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.tgz.txt
          path: ${{ vars.COLLECTOR }}-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.tgz.txt

  VulnScan:
    needs: [Date]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Restore ~/.m2/repository
        run: |
          mkdir -p ~/.m2
          tar -xzf "${{ vars.COLLECTOR }}-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.tgz" -C ~/.m2

      - name: Link Maven repository into workspace
        run: |
          mkdir -p m2repo
          ln -s ~/.m2/repository m2repo/repository
          ls -lAh m2repo

      - name: Generate SBOM (Syft) for ~/.m2/repository
        uses: anchore/sbom-action@v0.20.11
        with:
          path: m2repo/repository
          format: spdx-json
          output-file: ${{ vars.COLLECTOR }}-sbom-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.spdx.json
          dependency-snapshot: true

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-sbom-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.spdx.json
          path: ${{ vars.COLLECTOR }}-sbom-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.spdx.json

      - name: Grype scan (SARIF)
        uses: anchore/scan-action@v7.2.2
        with:
          path: m2repo/repository
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          output-file: ${{ vars.COLLECTOR }}-grype-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.sarif

      - name: Upload Grype SARIF
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-grype-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.sarif
          path: ${{ vars.COLLECTOR }}-grype-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ vars.COLLECTOR }}-grype-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.sarif

      - name: Grype scan (JSON)
        uses: anchore/scan-action@v7.2.2
        with:
          path: m2repo/repository
          fail-build: false
          severity-cutoff: high
          output-format: json
          output-file: ${{ vars.COLLECTOR }}-grype-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.json

      - name: Upload Grype JSON
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-grype-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.json
          path: ${{ vars.COLLECTOR }}-grype-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.json

      - name: Generate Grype Proof Report
        if: always()
        run: |
          set +e
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b .
          ./grype --version

          ./grype m2repo/repository -o table > grype-report.txt

          echo "## Grype Results (Maven ~/.m2) ⚓" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          head -n 250 grype-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          total_lines=$(wc -l < grype-report.txt | tr -d ' ')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Grype report saved as artifact. Total lines: ${total_lines}_" >> $GITHUB_STEP_SUMMARY

      - name: Upload Grype Evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evidence-grype-report-m2-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}
          path: grype-report.txt

      - name: Install OSV-Scanner CLI
        if: always()
        run: |
          set -euo pipefail
          OSV_VERSION="v2.3.2"
          curl -sSfL "https://github.com/google/osv-scanner/releases/download/${OSV_VERSION}/osv-scanner_linux_amd64" -o osv-scanner
          chmod +x ./osv-scanner
          ./osv-scanner --version

      - name: OSV scan (JSON + SARIF)
        if: always()
        run: |
          set +e
          ./osv-scanner scan . \
            --format json \
            --output "${{ vars.COLLECTOR }}-osv-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.json"

          ./osv-scanner scan . \
            --format sarif \
            --output "${{ vars.COLLECTOR }}-osv-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.sarif"

      - name: Upload OSV JSON
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-osv-main-${{ needs.Date.outputs.Date }}.json
          path: ${{ vars.COLLECTOR }}-osv-main-${{ needs.Date.outputs.Date }}.json

      - name: Publish OSV Summary
        if: always()
        run: |
          set +e
          f="${{ vars.COLLECTOR }}-osv-main-${{ needs.Date.outputs.Date }}.json"
          if [ ! -f "$f" ]; then
            echo "OSV output file not found: $f"
            exit 0
          fi

          echo "## OSV Results (Project / ecosystem scan) 🛡️" >> $GITHUB_STEP_SUMMARY

          # Count severities (OSV schema can vary; try best-effort)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Severity counts (best-effort):**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          jq -r '
            def sev(x):
              (x // "" | ascii_upcase);
            [
              .. | objects | .severity? // empty
            ] | flatten
            | map(sev(.))
            | reduce .[] as $s ({}; .[$s] = (.[$s] // 0) + 1)
            | to_entries
            | sort_by(.key)
            | .[]
            | "\(.key): \(.value)"
          ' "$f" 2>/dev/null || echo "Could not parse severities from OSV JSON"
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Print a small excerpt for quick eyeballing
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OSV excerpt (first findings):**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          jq -r '
            .results[]? 
            | select(.packages != null)
            | .packages[]?
            | "\(.package.ecosystem // "ecosystem") \(.package.name // "name") @ \(.package.version // "version")"
          ' "$f" 2>/dev/null | head -n 40 || echo "No package summary available"
          echo '```' >> $GITHUB_STEP_SUMMARY

  Code:
    needs: [Date]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven (populate ~/.m2)
        run: mvn -DskipTests=true --no-transfer-progress -B -s settings.xml package

      # syft/sbom-action "path" is relative to repo root, so expose ~/.m2/repository inside workspace
      - name: Link Maven repository into workspace
        run: |
          mkdir -p m2repo
          ln -s ~/.m2/repository m2repo/repository
          ls -lAh m2repo

      - name: Generate SBOM (Syft) for ~/.m2/repository
        uses: anchore/sbom-action@v0.24.0
        with:
          path: m2repo/repository
          format: spdx-json
          output-file: ${{ vars.COLLECTOR }}-sbom-m2-main-${{ needs.Date.outputs.Date }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-sbom-m2-main-${{ needs.Date.outputs.Date }}.spdx.json
          path: ${{ vars.COLLECTOR }}-sbom-m2-main-${{ needs.Date.outputs.Date }}.spdx.json

      - name: Grype scan (SARIF)
        uses: anchore/scan-action@v7.4.0
        with:
          path: m2repo/repository
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          output-file: ${{ vars.COLLECTOR }}-grype-m2-main-${{ needs.Date.outputs.Date }}.sarif

      - name: Upload Grype SARIF
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-grype-m2-main-${{ needs.Date.outputs.Date }}.sarif
          path: ${{ vars.COLLECTOR }}-grype-m2-main-${{ needs.Date.outputs.Date }}.sarif

      - name: Upload SARIF to GitHub Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ vars.COLLECTOR }}-grype-m2-main-${{ needs.Date.outputs.Date }}.sarif

      - name: Grype scan (JSON)
        uses: anchore/scan-action@v7.4.0
        with:
          path: m2repo/repository
          fail-build: false
          severity-cutoff: high
          output-format: json
          output-file: ${{ vars.COLLECTOR }}-grype-m2-main-${{ needs.Date.outputs.Date }}.json

      - name: Upload Grype JSON
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-grype-m2-main-${{ needs.Date.outputs.Date }}.json
          path: ${{ vars.COLLECTOR }}-grype-m2-main-${{ needs.Date.outputs.Date }}.json

      # Human-friendly "proof" report into Step Summary (like your container workflow)
      - name: Generate Grype Proof Report
        if: always()
        run: |
          set +e
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b .
          ./grype --version

          # Table format is easiest to read in summary
          ./grype m2repo/repository -o table > grype-report.txt

          echo "## Grype Results (Maven ~/.m2) ⚓" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          # Avoid mega summaries; keep it readable
          head -n 250 grype-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          total_lines=$(wc -l < grype-report.txt | tr -d ' ')
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Grype report saved as artifact. Total lines: ${total_lines}_" >> $GITHUB_STEP_SUMMARY

      - name: Upload Grype Evidence
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: evidence-grype-report-m2-main-${{ needs.Date.outputs.Date }}
          path: grype-report.txt

      # OSV scanning + Summary
      - name: OSV scan
        id: osv
        uses: google/osv-scanner-action@v2.3.5
        with:
          scan-args: >-
            --format=json
            --output=${{ vars.COLLECTOR }}-osv-main-${{ needs.Date.outputs.Date }}.json

      - name: Upload OSV JSON
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-osv-main-${{ needs.Date.outputs.Date }}.json
          path: ${{ vars.COLLECTOR }}-osv-main-${{ needs.Date.outputs.Date }}.json

      - name: Publish OSV Summary
        if: always()
        run: |
          set +e
          f="${{ vars.COLLECTOR }}-osv-main-${{ needs.Date.outputs.Date }}.json"
          if [ ! -f "$f" ]; then
            echo "OSV output file not found: $f"
            exit 0
          fi

          echo "## OSV Results (Project / ecosystem scan) 🛡️" >> $GITHUB_STEP_SUMMARY

          # Count severities (OSV schema can vary; try best-effort)
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Severity counts (best-effort):**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          jq -r '
            def sev(x):
              (x // "" | ascii_upcase);
            [
              .. | objects | .severity? // empty
            ] | flatten
            | map(sev(.))
            | reduce .[] as $s ({}; .[$s] = (.[$s] // 0) + 1)
            | to_entries
            | sort_by(.key)
            | .[]
            | "\(.key): \(.value)"
          ' "$f" 2>/dev/null || echo "Could not parse severities from OSV JSON"
          echo '```' >> $GITHUB_STEP_SUMMARY

          # Print a small excerpt for quick eyeballing
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**OSV excerpt (first findings):**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          jq -r '
            .results[]? 
            | select(.packages != null)
            | .packages[]?
            | "\(.package.ecosystem // "ecosystem") \(.package.name // "name") @ \(.package.version // "version")"
          ' "$f" 2>/dev/null | head -n 40 || echo "No package summary available"
          echo '```' >> $GITHUB_STEP_SUMMARY

  CollectBOM:
    needs: [Date]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn -DskipTests=true -B --no-transfer-progress -s settings.xml cyclonedx:makeAggregateBom

      - name: Create BoM ZIP
        run: |
          echo -e "\nTarget Directory Listing"
          ls -lAh target/*
          echo -e "\nTree of Target directory"
          tree target
          echo -e "\nZipping BOMs"
          zip -jD ${{ vars.COLLECTOR }}-bom-${{ needs.Date.outputs.Date }}.zip \
            target/bom.*

      - name: Upload BOM ZIP
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-bom-${{ needs.Date.outputs.Date }}.zip
          path: ${{ vars.COLLECTOR }}-bom-${{ needs.Date.outputs.Date }}.zip

  CollectXSD:
    needs: [Date]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Collect http://maven.apache.org/xsd
        run: |
          set +e
          wget -np -rN -l 1 --no-verbose http://maven.apache.org/xsd
          case $? in
            0) echo "Success";;
            8) echo "No changes";;
            *) echo "Failed";;
          esac

      - name: Zipup XSDs
        run: |
          cd maven.apache.org
          zip -r  ../${{ vars.COLLECTOR }}-xsd-${{ needs.Date.outputs.Date }}.zip xsd

      - name: Upload XSD artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-xsd-${{ needs.Date.outputs.Date }}.zip
          path: ${{ vars.COLLECTOR }}-xsd-${{ needs.Date.outputs.Date }}.zip
          if-no-files-found: error

  MakeISO:
    runs-on: ubuntu-latest
    needs: [Date, CollectM2, CollectBOM, CollectXSD, Code]
    env:
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Install mkisofs
        run: |
          sudo apt-get update -y
          sudo apt-get install -y mkisofs isomd5sum

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate Artifact Hash
        run: |
          sha256sum -b ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}* | tee \
            ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.sha

      - name: Upload Artifact sha artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.sha
          path: ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.sha
          if-no-files-found: error

      - name: Show Artifacts
        run: ls -1Ssh ${{ vars.COLLECTOR }}-*.*

      - name: Make ISO
        run: |
          mkisofs -J -R -v -T -l \
            -V '${{ vars.COLLECTOR }}-${{ needs.Date.outputs.Date }}' \
            -A '${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}' \
            -o ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.iso \
            ${{ vars.COLLECTOR }}-*.*

      - name: Implant MD5 sum into iso
        run: implantisomd5 ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.iso

      - name: Generate ISO Hash
        run: |
          sha256sum -b ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.iso | tee \
            ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.iso.sha

      - name: Show ISO & Hash
        run: ls -1Ssh *.iso*

      - name: Upload iso artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.iso
          path: "*.iso*"
          if-no-files-found: error

  VirusScan:
    runs-on: ubuntu-latest
    needs: [Date, MakeISO]
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          pattern: "*.iso"

      - name: List files to scan
        run: |
          echo "Files to be scanned:"
          ls -lh

      - name: Scan files for viruses
        id: virus_scan
        uses: hugoalh/scan-virus-ghaction/clamav@v0.20.1
        with:
          clamav_update: true
          found_log: true
          found_summary: true
          statistics_log: true
          statistics_summary: true

      - name: Save scan summary
        if: always()
        run: |
          echo "Virus scan completed" > ${{ vars.COLLECTOR }}-virus-scan-report-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.txt
          echo "Scan finished: ${{ steps.virus_scan.outputs.finish }}" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.txt
          echo "Viruses found: ${{ steps.virus_scan.outputs.found }}" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.txt
          echo "" >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.txt
          echo "For detailed scan results, check the job logs and step summary." >> ${{ vars.COLLECTOR }}-virus-scan-report-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.txt

      - name: Upload virus scan report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ${{ vars.COLLECTOR }}-virus-scan-report-${{ env.BRANCH_NAME }}-${{ needs.Date.outputs.Date }}.txt
          path: "*virus-scan-report*.txt"
          if-no-files-found: warn

  Release:
    runs-on: ubuntu-latest
    needs: [Date, VirusScan]
    env:
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Show Artifacts
        run: ls -1Ssh ${{ vars.COLLECTOR }}-*.*

      - name: Set up git
        run: |
          git config user.name "$(git log -n 1 --pretty=format:%an)"
          git config user.email "$(git log -n 1 --pretty=format:%ae)"

      - name: Create tag
        uses: rickstaa/action-create-tag@v1
        id: tag_create
        with:
          tag: ${{ needs.Date.outputs.Date }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_exists_error: false
          message: "Release for ${{ needs.Date.outputs.Date }} run"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ vars.COLLECTOR }} ${{ needs.Date.outputs.Date }}
          tag_name: ${{ needs.Date.outputs.Date }}
          make_latest: true
          files: ${{ vars.COLLECTOR }}-*.*

  Sharepoint:
    runs-on: ubuntu-latest
    needs: [Date, VirusScan]
    env:
      GH_TOKEN: ${{ github.token }}
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Check out repository code
        uses: actions/checkout@v6

      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Show Artifacts
        run: ls -1Ssh ${{ vars.COLLECTOR }}-*.*
